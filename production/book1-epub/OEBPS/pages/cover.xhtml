<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1518, height=2346"/>
  <title>Cover</title>
  <link rel="stylesheet" type="text/css" href="../css/fixed.css"/>
</head>
<body epub:type="cover">
  <div class="page" style="background:#1e3d1a;">
    <!-- Full-bleed cover art -->
    <img src="../images/cover.png" alt="The Rising River — cover art" style="position:absolute;top:0;left:0;width:1518px;height:2346px;object-fit:cover;"/>
    <!-- Title overlay: upper portion, semi-transparent band -->
    <div style="position:absolute;top:0;left:0;width:1518px;padding:90px 90px 70px 90px;background:linear-gradient(to bottom,rgba(10,30,10,0.82) 0%,rgba(10,30,10,0.0) 100%);text-align:center;">
      <div style="font-family:Georgia,serif;font-size:110px;font-weight:bold;color:#fce070;line-height:1.05;text-shadow:0 4px 28px rgba(0,0,0,0.7);">The Rising<br/>River</div>
      <div style="font-family:Georgia,serif;font-size:32px;letter-spacing:9px;text-transform:uppercase;color:#a8d4a0;margin-top:28px;">Whisperwood Book 1</div>
    </div>
    <!-- Author overlay: bottom strip -->
    <div style="position:absolute;bottom:0;left:0;width:1518px;padding:60px 90px 80px 90px;background:linear-gradient(to top,rgba(10,30,10,0.82) 0%,rgba(10,30,10,0.0) 100%);text-align:center;">
      <div style="font-family:Georgia,serif;font-size:42px;color:#e8f5e4;letter-spacing:3px;">Reena Gellerup</div>
    </div>
  </div>
</body>
</html>
